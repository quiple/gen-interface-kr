<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gen Interface KR</title>
    <meta
      name="description"
      content="Gen Interface KR은 디지털 인터페이스를 위해 설계된, 영문과 국문의 조화를 목표로 하는 서체입니다."
    />

    <!-- Open Graph / Twitter Card. og:url and og:image must be absolute
         (path-relative URLs aren't honored by most scrapers). Twitter falls
         back to the og:* values when twitter:* aren't given, so we only set
         the card type explicitly. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gen Interface KR" />
    <meta
      property="og:description"
      content="Gen Interface KR은 디지털 인터페이스를 위해 설계된, 영문과 국문의 조화를 목표로 하는 서체입니다."
    />
    <meta property="og:url" content="https://gen.typesetting.jp/" />
    <meta property="og:image" content="https://gen.typesetting.jp/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gen-interface-kr@%APP_VERSION%/all.css" />
  </head>
  <body class="site-loading">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
