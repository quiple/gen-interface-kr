name: Publish Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install ofl-font-baker freetype-py pytest

      - name: Run Python tests
        run: python3 -m pytest

      - name: Build fonts
        run: python3 -m font.build

      - name: Build webfont subsets
        run: python3 -m webfont.build --clean --strategy google-japanese

      - name: Package release assets
        run: python3 -m release.build --version "$TAG_NAME"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/release/github/* --clobber
          else
            gh release create "$TAG_NAME" dist/release/github/* --title "$TAG_NAME" --generate-notes
          fi
